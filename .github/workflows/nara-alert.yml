name: 나라장터 입찰공고 알림

on:
  workflow_dispatch:

jobs:
  nara-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Slack 테스트
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"text":"✅ 슬랙봇 연결 성공!"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
