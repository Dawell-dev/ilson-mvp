name: 나라장터 입찰공고 알림

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  nara-alert:
    runs-on: ubuntu-latest
    steps:
      - name: 나라장터 공고 조회 및 Slack 발송
        run: |
          node << 'EOF'
          const keywords = [
            "AI 활용 용역",
            "인공지능 용역",
            "AI 시스템 구축",
            "AI 플랫폼 개발",
            "챗봇 구축",
            "AI 솔루션",
            "디지털 전환 용역",
            "AI 도입",
          ];

          const NARA_KEY = process.env.NARA_API_KEY;
          const SLACK_URL = process.env.SLACK_WEBHOOK_URL;

          function today() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2,'0');
            const day = String(d.getDate()).padStart(2,'0');
            return `${y}${m}${day}0000`;
          }

          async function fetchBids(keyword) {
            const params = new URLSearchParams({
              serviceKey: NARA_KEY, pageNo:'1', numOfRows:'10',
              inqryDiv:'1', inqryBgnDt: today(), inqryEndDt: today(),
              bidNtceNm: keyword, type:'json'
            });
            const url = `https://apis.data.go.kr/1230000/BidPublicInfoService04/getBidPblancListInfoServc?${params}`;
            const res = await fetch(url);
            const data = await res.json();
            const items = data?.response?.body?.items?.item;
            if (!items) return [];
            return Array.isArray(items) ? items : [items];
          }

          function formatPrice(amt) {
            if (!amt || amt === '0') return '미공개';
            const n = Number(amt);
            if (n >= 100000000) return `${(n/100000000).toFixed(1)}억원`;
            if (n >= 10000) return `${Math.floor(n/10000).toLocaleString()}만원`;
            return `${n.toLocaleString()}원`;
          }

          const allBids = [];
          for (const kw of keywords) {
            const bids = await fetchBids(kw);
            allBids.push(...bids);
          }

          const unique = Array.from(new Map(allBids.map(b=>[b.bidNtceNo,b])).values());

          if (unique.length === 0) {
            await fetch(SLACK_URL, {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({text:'📋 오늘은 새로운 AI 관련 입찰공고가 없어요.'})
            });
          } else {
            const dateStr = new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
            const blocks = [
              {type:'header', text:{type:'plain_text', text:`🤖 ${dateStr} AI 관련 입찰공고 ${unique.length}건`}},
              {type:'divider'},
              ...unique.map(b=>({
                type:'section',
                text:{type:'mrkdwn', text:`*${b.bidNtceNm}*\n🏢 ${b.ntceInsttNm}\n📅 마감: ${b.bidClseDt?.slice(0,8).replace(/(\d{4})(\d{2})(\d{2})/,'$1.$2.$3')}\n💰 ${formatPrice(b.asignBdgtAmt)}`}
              }))
            ];
            await fetch(SLACK_URL, {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({blocks})
            });
          }
          EOF
        env:
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
