name: 나라장터 + K-APT 입찰공고 알림

on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

jobs:
  nara-alert:
    runs-on: ubuntu-latest
    steps:
      - name: 나라장터 AI 관련 공고 조회 및 Slack 발송
        shell: python3 {0}
        run: |
          import urllib.request, urllib.parse, json, os
          from datetime import datetime

          KEY   = os.environ['NARA_API_KEY']
          SLACK = os.environ['SLACK_WEBHOOK_URL']
          TODAY = datetime.now().strftime('%Y%m%d') + '0000'
          KEYWORDS = ['AI 활용 용역', '인공지능 용역', 'AI 시스템 구축', 'AI 플랫폼 개발', 'AI 솔루션', '디지털 전환 용역']

          def fetch(kw):
            q = urllib.parse.urlencode({'pageNo':'1','numOfRows':'10','inqryDiv':'1','inqryBgnDt':TODAY,'inqryEndDt':TODAY,'bidNtceNm':kw,'type':'json'})
            url = f'https://apis.data.go.kr/1230000/BidPublicInfoService04/getBidPblancListInfoServc?serviceKey={KEY}&{q}'
            try:
              with urllib.request.urlopen(url, timeout=10) as r:
                d = json.loads(r.read())
              items = d.get('response',{}).get('body',{}).get('items',{})
              if not items: return []
              item = items.get('item',[])
              return item if isinstance(item, list) else [item]
            except Exception as e:
              print(f'오류: {kw} - {e}')
              return []

          def slack(payload):
            data = json.dumps(payload, ensure_ascii=False).encode('utf-8')
            req = urllib.request.Request(SLACK, data=data, headers={'Content-Type':'application/json'})
            urllib.request.urlopen(req)

          all_bids = []
          for kw in KEYWORDS:
            all_bids.extend(fetch(kw))
          seen = {}
          for b in all_bids:
            seen[b.get('bidNtceNo','')] = b
          unique = list(seen.values())

          if not unique:
            slack({'text': '📋 오늘은 새로운 AI 관련 나라장터 공고가 없어요.'})
          else:
            d = datetime.now().strftime('%m월 %d일')
            blocks = [{'type':'header','text':{'type':'plain_text','text':f'🤖 {d} 나라장터 AI 관련 입찰공고 {len(unique)}건'}},{'type':'divider'}]
            for b in unique:
              dt = b.get('bidClseDt','')
              dt_str = f"{dt[:4]}.{dt[4:6]}.{dt[6:8]}" if len(dt)>=8 else '미정'
              blocks.append({'type':'section','text':{'type':'mrkdwn','text':f"*{b.get('bidNtceNm','')}*\n🏢 {b.get('ntceInsttNm','')}\n📅 마감: {dt_str}"}})
            slack({'blocks': blocks})
        env:
          NARA_API_KEY:      ${{ secrets.NARA_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_AI }}

  kapt-alert:
    runs-on: ubuntu-latest
    needs: nara-alert
    steps:
      - name: Playwright 설치
        run: |
          pip install playwright --break-system-packages
          playwright install chromium --with-deps

      - name: K-APT 입찰공고 크롤링 및 Slack 발송
        shell: python3 {0}
        run: |
          import json, os, re, urllib.request, urllib.parse
          from datetime import datetime, timedelta
          from playwright.sync_api import sync_playwright

          SLACK    = os.environ['SLACK_WEBHOOK_URL']
          BASE_URL = 'https://www.k-apt.go.kr'
          KEYWORDS = ['미화용역', '경비용역']

          today      = datetime.now()
          date_end   = today.strftime('%Y-%m-%d')
          date_start = (today - timedelta(days=30)).strftime('%Y-%m-%d')

          def slack(payload):
            data = json.dumps(payload, ensure_ascii=False).encode('utf-8')
            req  = urllib.request.Request(SLACK, data=data, headers={'Content-Type': 'application/json'})
            urllib.request.urlopen(req)

          def extract_bid_info(row_html):
            # KG2B 타입: kg2b_XXXXX
            m = re.search(r'(?:kg2b|kapt)_\d+', row_html)
            if m:
              return ('kg2b', m.group(0))
            # K-APT 타입: goView('XXXXXXXXXXXXXXXXX')
            m = re.search(r"goView\('(\d+)'\)", row_html)
            if m:
              return ('kapt', m.group(1))
            return (None, None)

          def make_detail_url(kw, bid_type, bid_id):
            base_params = {
              'searchBidGb': 'bid_gb_1', 'bidTitle': kw, 'aptName': '',
              'searchDateGb': 'reg', 'dateStart': date_start, 'dateEnd': date_end,
              'dateArea': '1', 'bidState': '', 'codeAuth': '', 'codeWay': '',
              'codeAuthSub': '', 'codeSucWay': '', 'codeClassifyType1': '',
              'codeClassifyType2': '', 'codeClassifyType3': '', 'pageNo': '1',
              'bidArea': '', 'dTime': str(int(today.timestamp() * 1000)),
              'mainKaptCode': '', 'aptCode': ''
            }
            if bid_type == 'kg2b':
              base_params.update({'type': '4', 'bidNum': bid_id, 'bidNo': ''})
            else:
              base_params.update({'type': '1', 'bidNum': bid_id, 'bidNo': bid_id})
            return f'{BASE_URL}/bid/bidDetail.do?{urllib.parse.urlencode(base_params)}'

          def crawl_kapt():
            bids = []
            with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              ctx  = browser.new_context(user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36')
              page = ctx.new_page()

              for kw in KEYWORDS:
                try:
                  params = urllib.parse.urlencode({
                    'searchBidGb': 'bid_gb_1', 'bidTitle': kw, 'aptName': '',
                    'searchDateGb': 'reg', 'dateStart': date_start,
                    'dateEnd': date_end, 'dateArea': '1', 'bidState': ''
                  })
                  list_url = f'{BASE_URL}/bid/bidList.do?{params}'
                  page.goto(list_url, timeout=30000, wait_until='networkidle')

                  rows = page.query_selector_all('table tbody tr')
                  print(f'[{kw}] {len(rows)}개 행 발견')

                  for row in rows:
                    try:
                      cells = row.query_selector_all('td')
                      if len(cells) < 6: continue
                      status = cells[5].inner_text().strip()
                      if '마감' in status: continue

                      title        = cells[3].inner_text().strip()
                      deadline     = cells[4].inner_text().strip()
                      kind         = cells[1].inner_text().strip()
                      complex_name = cells[6].inner_text().strip() if len(cells) > 6 else ''

                      row_html = row.inner_html()
                      bid_type, bid_id = extract_bid_info(row_html)
                      print(f'  {title[:20]} | type={bid_type} | id={bid_id}')

                      detail_url = make_detail_url(kw, bid_type, bid_id) if bid_id else list_url

                      if title and not any(b['title'] == title for b in bids):
                        bids.append({
                          'title': title, 'kind': kind,
                          'deadline': deadline, 'complex': complex_name,
                          'url': detail_url
                        })
                    except Exception as e:
                      print(f'  행 오류: {e}')
                      continue

                except Exception as e:
                  print(f'크롤링 오류 [{kw}]: {e}')
                  continue

              browser.close()
            return bids

          bids = crawl_kapt()
          print(f'K-APT 최종 {len(bids)}건')

          if not bids:
            slack({'text': '🏢 오늘은 새로운 K-APT 미화용역·경비용역 공고가 없어요.'})
          else:
            d      = today.strftime('%m월 %d일')
            blocks = [
              {'type':'header','text':{'type':'plain_text','text':f'🏢 {d} K-APT 신규 입찰공고 {len(bids)}건 (미화·경비용역)'}},
              {'type':'divider'}
            ]
            for b in bids:
              blocks.append({
                'type': 'section',
                'text': {'type': 'mrkdwn', 'text':
                  f"*{b['title']}*\n"
                  f"🏘️ {b['complex']}  |  📂 {b['kind']}\n"
                  f"📅 마감: {b['deadline']}"},
                'accessory': {
                  'type': 'button',
                  'text': {'type': 'plain_text', 'text': 'K-APT 바로가기'},
                  'url': b['url']
                }
              })
            slack({'blocks': blocks})
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
